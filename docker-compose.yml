version: '3.8'

services:
  registry:
    build:
      context: ./backend/registry
      dockerfile: Dockerfile
    container_name: gestinc-registry
    ports:
      - "8761:8761"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: gestinc-gateway
    ports:
      - "5000:5000"
    environment:
      - REGISTRY_URL=http://registry:8761
    depends_on:
      - registry
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: gestinc-auth
    ports:
      - "3001:3001"
    environment:
      - JWT_SECRET=gestinc_secret_2026
      - REGISTRY_URL=http://registry:8761
    volumes:
      - db_data:/app/data
    depends_on:
      - registry
    restart: unless-stopped

  incident-service:
    build:
      context: ./backend/services/incident-service
      dockerfile: Dockerfile
    container_name: gestinc-incidents
    ports:
      - "3002:3002"
    environment:
      - JWT_SECRET=gestinc_secret_2026
      - REGISTRY_URL=http://registry:8761
    volumes:
      - db_data:/app/data
    depends_on:
      - registry
    restart: unless-stopped

  user-service:
    build:
      context: ./backend/services/user-service
      dockerfile: Dockerfile
    container_name: gestinc-users
    ports:
      - "3003:3003"
    environment:
      - JWT_SECRET=gestinc_secret_2026
      - REGISTRY_URL=http://registry:8761
    volumes:
      - db_data:/app/data
    depends_on:
      - registry
    restart: unless-stopped

  chat-service:
    build:
      context: ./backend/services/chat-service
      dockerfile: Dockerfile
    container_name: gestinc-chat
    ports:
      - "3004:3004"
    environment:
      - JWT_SECRET=gestinc_secret_2026
      - REGISTRY_URL=http://registry:8761
    volumes:
      - db_data:/app/data
    depends_on:
      - registry
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: gestinc-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  db_data:

networks:
  default:
    name: gestinc-network
